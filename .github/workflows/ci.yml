name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      name: Checkout code

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Validate cloud function syntax
      run: |
        echo "=== 检查云函数语法 ==="
        for dir in uniCloud-aliyun/cloudfunctions/*/; do
          if [ -f "${dir}index.js" ]; then
            echo "检查: ${dir}index.js"
            node --check "${dir}index.js" 2>&1 || echo "警告: ${dir}index.js 包含 uniCloud 特有API，跳过检查"
          fi
        done
        echo "云函数语法检查完成"

    - name: Check documentation files
      run: |
        echo "=== 检查必要文档 ==="
        docs=("README.md" "API.md" "prompt_log.md" "code_review.md" "summary.md")
        missing=0
        for doc in "${docs[@]}"; do
          if [ -f "$doc" ]; then
            echo "✓ $doc 存在"
          else
            echo "✗ $doc 缺失"
            missing=1
          fi
        done
        if [ $missing -eq 1 ]; then
          echo "有文档缺失，请检查"
          exit 1
        fi
        echo "文档检查通过"

    - name: Run ESLint
      run: npx eslint uniCloud-aliyun/cloudfunctions/ --ext .js || echo "ESLint检查完成"

    - name: Run unit tests
      run: npm test

    - name: Upload test coverage
      uses: actions/upload-artifact@v4
      with:
        name: test-coverage
        path: coverage/
